# This workflow will install Python dependencies, run tests and lint.

name: Test

on:
  pull_request:
    branches: [ "*" ]

# Declare default permissions as read only.
permissions: read-all

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: [ "3.13" ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff coverage
          pip install -r requirements.txt
      - name: Lint with ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check . --select=E9,F63,F7,F82 --target-version=py313
          # default set of ruff rules with GitHub Annotations
          ruff check . --target-version=py313
      - name: Unit Test Coverage
        run: |
          coverage run -m unittest discover -v -s tests/ -p 'test_*.py'
          coverage report -m gauge_api_steps/*.py
